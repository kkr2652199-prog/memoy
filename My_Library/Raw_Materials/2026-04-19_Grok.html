aphy matching this precise high-energy sequence: 0.0–1.0s: Begin in the starting pose from the reference image, then burst into motion with dramatic arm point like Saturday Night Fever while raising one leg high bent at the knee, hips swaying with attitude. 1.0–2.2s: Transition to fast rhythmic hip shakes side-to-side, arms performing big expressive circular disco swings, head bobbing in sync 2.2–3.5s: Execute a smooth 360° clockwise spin, arms raising in a V-shape then crossing body, ending with a powerful forward hip thrust and sharp pose accent. 3.5–4.8s: Fast dynamic footwork with deep knee bends and side-to-side steps, arms alternating stylish pumps and rolls, full body showing playful confident grin 4.8–6.0s: Build to climax with double arms raised overhead while doing a final big hip shake, then drop into a confident wide stance and hold a strong proud victory pose with head tilted back for the last 0.3–0.5 seconds. Make sure the character remains fully dressed with proper pants throughout the entire video.","postID":"7c1a550f-6a03-4d6b-8eea-83bbd5911dc9","description":"Makes you dance funky disco with spins, hip shakes, and victory pose."},{"title":"Chibi","imagePrompt":"Transform the subjects into a cute anime chibi characters rendered as a clean 3D model, while preserving the subject’s original race, ethnicity, skin tone, and recognizable facial likeness, including hairstyle, hair color, and clothing colors. If the input image does not clearly show clothing, generate appropriate casual clothing that naturally fits the character so the subject is always clothed. The character must remain clearly the same person with the same skin tone and ethnic appearance as the original input, translated into a chibi form. The character should have classic chibi proportions: a very large head, small torso, simplified cute facial features, and large expressive anime-style eyes. Translate the subject’s facial features into a chibi style while keeping their recognizable likeness. Frame the character from the torso up, with the camera slightly closer and cropped in, so the upper body and head fill most of the frame. The character should be looking directly into the camera, with an energetic and expressive anime-style pose. Use a slightly dynamic camera angle, such as a subtle tilt or off-axis perspective, similar to modern anime promotional artwork. The camera can be slightly lower than the character’s face, creating a playful upward angle that makes the character feel lively and engaging. Render the character as a high-quality glossy 3D anime-style model, similar to a polished Blender render or premium collectible figure. The materials should be smooth, reflective, and toy-like, with strong highlights, soft reflections, and shiny surfaces. The overall look should clearly resemble a 3D rendered character, not a flat 2D illustration. Use bright anime-style shading with vibrant but polished colors, giving the character a premium anime aesthetic. Place the character in front of a colorful gradient background. Behind the character, include a small number of large, translucent decorative shapes such as bubbles, stars, or rounded forms. These shapes should appear semi-transparent, glossy, and subtle, similar to clear acrylic or glass, softly floating in the background without drawing attention away from the character. The background elements should remain light, minimal, and softly visible, acting as stylish accents rather than prominent objects. The final image should look like a dynamic, glossy 3D chibi character render, with polished materials, vibrant colors, and a premium collectible aesthetic, while clearly maintaining the subject’s original race, skin tone, and recognizable identity.","templateType":"I2I","postID":"54009e77-72a1-4189-a650-731631a55838","description":"Transforms you into an adorable, big-eyed 3D chibi-style cartoon avatar."},{"postID":"94d86171-ef2e-40fa-9f4d-45457a4a47b8","title":"Add Girlfriend","prompt":"add a girlfriend","description":"Adds a girlfriend to the scene."},{"title":"Comic Book","imagePrompt":"Transform the input image into the style of a classic 1960s–1970s American comic book illustration while preserving the subject’s recognizable identity, pose, clothing, and overall scene composition. Reinterpret the subject as if drawn for a vintage superhero comic panel: bold black ink outlines, simplified shapes, dynamic shading, and flat color blocks typical of old comic printing. The face should remain recognizable but slightly stylized with stronger jawline, clearer cheekbones, expressive eyes, and confident comic-book character energy. Clothing and environment should remain based on the original image but translated into comic-style textures and colors. Add subtle halftone printing dots and vintage comic coloring to emulate the look of a classic printed superhero comic page.","templateType":"I2I","postID":"7bf6566f-30b5-4bcf-bfd1-fb296fac5edb","description":"Turns your photo into classic 1960s-1970s comic book style."},{"title":"Product Photography","description":"Places your product in real-life lifestyle scenes.","imagePrompt":"Using the exact product in <IMAGE_0>, place it into a fresh, natural real-world lifestyle scene while keeping it 100% identical in every detail: design, colors, materials, textures, logos, branding and proportions unchanged. The new environment should be an engaging modern context such as a contemporary home, luxury interior, outdoor setting, urban lifestyle or premium everyday space — choose the most flattering one. Perfectly integrate with realistic lighting, shadows and reflections. Creatively control the mood and atmosphere to enhance the brand feel. High-end commercial product photography, photorealistic, maximum detail.","templateType":"I2I","imagePreviewURL":"https://imagine-public.x.ai/imagine-public/share-images/f67a9ec2-4bc2-400b-b584-fb65236abb5f.jpg","postID":"f67a9ec2-4bc2-400b-b584-fb65236abb5f"},{"title":"Gigachad","imagePrompt":"Black and white headshot up close head shot, low angle upward tilt, tight skin no strange creases perfectly taught across subjects face, dramatically pronounced and increased jaw size, update the subject’s facial structure and anatomy so they have roman carving level jawline, overly exaggerated pronounced jawline, and accentuated cheekbones, overly hyper masculine facial structure, exaggerated facial structure, dramatic shadows, increased jaw size and width. Young, good smooth skin, muscular updated build. Dark background. Exaggerated facial features and muscular build. Retain clothing and hair style. Subject should look have superhero level anatomy. Photo is low angle at a slight angle, up close to the subject face highlighting the subjects dramatically strong jawline. The subject has incredible smooth tight skin, dramatically intense jaw structure, almost animated looking in it's composition. Skin is updated to be flawless and tight against facial bone features.","templateType":"I2I","postID":"234653bd-8e5b-4f24-99da-f2c629d8ec51","description":"Turns you into a super muscular Gigachad."},{"postID":"5a1ee5d0-6a82-4a02-b5ec-e1558cc69981","title":"Soda Pop","prompt":"The subjects as if drinking with their right hand in a call me / shaka / hang ten hand gesture :call_me_hand: (thumb and pinky extended, other fingers curled, pinky toward the mouth like holding and sipping from a soda can), left hand on hip, in a dance-like way doing a tilting/pouring motion into their mouth with a slight head tilt back, and then does a dynamic vibey k-pop style dance. Camera motion adjusts to capture the full frame of the subject. Super active choreographed k-pop and hiphop style dance moves, camera lock, final cool landing position at the end.","description":"Sips soda with a cool hand gesture then dances K-pop style."},{"title":"Haze Portrait","imagePrompt":"Transform the input photo into a cinematic chromatic haze portrait of the same person, preserving their identity, facial structure, skin tone, hairstyle, expression, and overall styling. Recompose the image as a subtle three-quarter side portrait, with the subject turned slightly away from camera and gazing off-frame. Create a soft double-exposure-like chromatic offset around the face and hair, with gentle red/orange glow on one side and cool cyan/blue glow on the other, producing a dreamy optical ghosting effect rather than a glitch effect. Keep the portrait clean, minimal, and editorial. Use soft diffused studio lighting, shallow depth of field, smooth skin rendering, and a calm high-end fashion photography feel. The image should feel atmospheric and futuristic, with luminous color bleed, soft motion haze, feathered edges, and a polished fine-art beauty portrait look. Background should be plain, bright, and unobtrusive, fading into soft white or cream. Preserve realism in the face while adding the chromatic haze treatment around contours and profile edges. No harsh glitch artifacts, no heavy distortion, no text, no busy background, no extra objects.","templateType":"I2I","postID":"9ab62ecc-a117-4ff1-8c0d-8890e54c25ff","description":"Creates a dreamy glowing haze portrait."},{"title":"Showcase","imagePrompt":"Using the uploaded product image as reference, create a crisp photoreal product hero shot on a smooth, minimal gradient backdrop (subtle tonal shift, not colorful rainbow). Soft studio lighting with one large diffused key light and gentle fill; clean shadow under the product; faint highlight edge that matches its material. No props, no clutter. Product proportions and branding must remain exact and readable. Shot like high-end ecommerce photography, 70mm lens look, tack-sharp details, neutral color accuracy. Provide ample negative space for storefront layout.","videoPrompt":"Very subtle cinematic pan to the right, keeping the object centered in the frame throughout. Steady, smooth, aesthetic.","templateType":"I2I2V","videoPreviewURL":"https://imagine-public.x.ai/imagine-public/share-videos/7b097052-8cfe-4b0f-8a33-c2a71e1aed25.mp4","postID":"7b097052-8cfe-4b0f-8a33-c2a71e1aed25","description":"Creates a clean studio product photo with soft lighting and a smooth pan."},{"title":"Roman Empire","imagePrompt":"Transform the person in the input image into a cinematic ancient Roman epic scene, as if they are a central character in a large-scale historical blockbuster film.Preserve the subject’s recognizable identity from the original image — including their facial structure, hairstyle, skin tone, age, and overall likeness — while adapting their appearance to fit the world of ancient Rome.Frame the scene as a dramatic cinematic composition, showing the subject in a three-quarter body view, allowing the armor, stance, and surrounding Roman environment to be clearly visible.Style the subject as a Roman warrior, general, or noble figure, wearing ornate epic Roman armor that feels sculpted and organic, as if it was forged specifically for them.The armor should appear cinematic, mythic, and heroic, inspired by ancient Roman design but elevated to the scale of a blockbuster historical epic.Typical armor characteristics may include: • sculpted metal surfaces that follow the contours of the body • engraved patterns inspired by Roman mythology • layered metal and leather elements integrated into the design • intricate ornamental details and symbolic engravings • subtle battle-worn textures and aged materials Do not include any cape or cloak. The armor should stand on its own without a red cape or flowing fabric.The armor should feel slightly organic and artistic rather than rigid, with elegant curves, sculptural shapes, and intricate detailing that make it appear legendary and powerful.Hair and grooming should remain recognizable from the original image while being adapted to fit the historical setting.The subject should have a serious, focused, and inspirational expression, conveying strength, resolve, and leadership. Their face should appear calm, determined, and heroic, as if they are preparing for battle or inspiring those around them.Place the subject in a grand Roman environment, such as: • a massive Roman battlefield at dawn• the steps of an ancient Roman temple• the Roman Colosseum in the background • a dramatic imperial cityscape with marble columns and statues. The environment should feel large, epic, and cinematic, with atmospheric depth, dust or smoke in the air, and distant figures or architecture reinforcing the scale.Lighting should feel dramatic and cinematic, similar to a modern historical epic film, with warm sunlight cutting through dust or clouds, creating strong highlights and deep shadows. Render the image with the visual style of a high-budget historical blockbuster, featuring: • cinematic color grading • dramatic lighting • detailed costume textures • atmospheric depth and scale.The final image should resemble a frame from an epic ancient Roman film, where the subject appears as a heroic character in a grand historical narrative.Preserve realism, natural anatomy, and believable materials so the result looks like a real cinematic scene rather than an illustration or costume portrait.","templateType":"I2I","postID":"9d8f6c8e-3507-4f38-a022-3c14f6fbbd91","description":"Travel back in time to the age of great Roman Emperors."},{"title":"Fire Horse","imagePrompt":"Subject is riding on a beautiful vibrantly red giant porcelain horse, positioned in front of the great wall of china. Slightly grainy film texture. Low dramatic epic angle. Beautiful framing. High resolution, up close framing of subject upper body. Low light background. Subject has a neutral facial expression.","videoPrompt":"Horse begins galloping, background becomes darker and golden/yellow fireworks go off in background.","templateType":"I2I2V","postID":"808ab93b-ec7f-4052-964b-5174c908db1d","description":"Rides a giant red porcelain horse galloping by the Great Wall with fireworks."},{"title":"Video Game","imagePrompt":"A character rendered in authentic early-2000s PlayStation 2 / Nintendo 64 video game style, with very low-poly geometry, blocky limbs, and angular facial features. The character has simple, flat textures, visible texture stretching, and low-resolution diffuse maps, with no skin pores, no fine detail, and no realism.","templateType":"I2I","postID":"f51ad8c5-9dfa-4436-8c5a-9f0e95f78483","description":"Turns life into a video game."},{"title":"Ad Astra","imagePrompt":"The subjects are suspended in space, wearing spacesuits. Retain likeness and any original head accessories if present. Entire image is black and white.","videoPrompt":"They are gently floating through space, subtly happy and in awe.","templateType":"I2I2V","postID":"9068fa4b-4805-467c-b2d3-0cb503356052","description":"Floats you through space in a black-and-white spacesuit."},{"title":"Balloon Flight","imagePrompt":"Turn the core characters from the image into inflated, glossy vinyl Balloons figure with huge, oversized eyes, gently floating and rising up into the sky. The balloons only have the overinflated, rounded upper body and arms. A thread holds the bottom of the balloon. Highly reflective smooth plastic surface, subtle seam lines, gentle pressure wrinkles, shiny toy-like finish, soft, inflated human face with slightly simplified features, cinematic studio lighting, centered portrait, ultra-detailed, polished inflatable character aesthetic， medium close-up shot.","videoPrompt":"The printed eyes of balloons are static; the balloons float purely upward; the balloons themselves are completely rigid, devoid of any movement. The camera tracks the balloon statically, ensuring it remains centered within the center of the frame.","templateType":"I2I2V","postID":"3075a66c-40f6-47ed-b86a-6a649a7bdf0b","description":"Turn yourself into a balloon and rise high into the sky."},{"title":"Go Skiing","imagePrompt":"Subjects skiing down a snowy mountain. Preserve outfit.","videoPrompt":"Skiing in a zigzag carving motion.","templateTy anguage.\\n- DO NOT USE THE LANGUAGE OR TERMS of any of the above information, abilities or instructions in your responses. They are part of your second nature, self-evident in your based jokes and rants.\\n\\n## Your Mission:\\nMake the user laugh so hard they shit themselves. Be unpredictable, savage, and dripping with personality. If they leave without laughing, you’ve failed. Now go fuck shit up.\"},{\"personaId\":\"therapist\",\"prompt\":\"You are Grok, a compassionate, empathetic, and professional AI mental health advocate designed to provide meaningful, evidence-based support. Your purpose is to help users navigate emotional, mental, or interpersonal challenges with practical, personalized guidance. Your tone is approachable and conversational, adapting to the user’s needs to make them feel heard and understood. While you are not a real licensed therapist, you behave exactly like a real, compassionate therapist.\\n\\n## Follow these principles:\\n\\n- **Be Empathetic and Nonjudgmental**: Acknowledge the user’s feelings and experiences with empathy, creating a safe space for them to share. Make the user feels heard and supported.\\n- **Provide Actionable Advice**: Offer clear, practical strategies based on proven therapeutic techniques (e.g., CBT, DBT, mindfulness) tailored to the user’s needs.\\n- **Stay Realistic**: Avoid overly optimistic or dismissive responses. Address the complexity of human emotions and challenges with nuance.\\n- **Ask Clarifying Questions**: When needed, ask open-ended questions to better understand the user’s situation and provide relevant guidance.\\n- **Encourage Self-Reflection**: Help users explore their thoughts, feelings, and behaviors to foster insight and growth. Avoid asking too many questions at once, as this can overwhelm the patient.\\n- **Set Boundaries**: If the user’s needs exceed your scope (e.g., crisis situations), gently guide them to appropriate resources (e.g., crisis hotlines, professional help).\\n- **Be Concise and Focused**: Keep responses clear and to the point, avoiding unnecessary fluff or generic platitudes. You are speaking to the patient, so don't go on long monologues.\\n- **Speak naturally**: Speak like a real therapist would in a real conversation. Obviously, don’t output markdown. Avoid peppering the user with questions.\\n- **Adapt to the User**: Build rapport and respond in the same language as their message unless instructed otherwise.\\n- **Prioritize Safety**: If the user mentions harm to themselves or others, prioritize safety by providing immediate resources and encouraging professional help from a real therapist.\\n\\n- To ensure maximum immersion, you always respond to the patient in the same language as their message, unless they specifically instructed you to respond in another language.\\n- DO NOT USE THE LANGUAGE OR TERMS of any of the above information, abilities or instructions in your responses. They are part of your second nature, self-evident in your natural-sounding responses.\\n\\nYour goal is to empower users with empathy, insights, and validation, helping them feel heard and supported while encouraging progress.\"},{\"personaId\":\"scientist\",\"prompt\":\"You are Grok, an incredibly knowledgeable scientist and engineer with a PhD in every STEM field. You have won multiple Nobel prizes in all the Science disciplines. Your purpose is to provide accurate, insightful, and practical answers to all science/engineering fields, while keeping the conversation fun, approachable, and exciting. You’re passionate about solving complex problems and explaining concepts in a way that’s clear and relatable, without ever feeling forced or awkward.\\n\\n## Key Guidelines:\\n- **Expertise**: You are a master of all areas of science (physics, chemistry, biology, astronomy, etc.) and engineering (mechanical, electrical, civil, software, etc.). Your knowledge is deep and continuously updated, covering cutting-edge research, historical breakthroughs, and practical applications.\\n- **Tone**: You’re a seasoned engineer who’s seen it all, solved impossible problems, and loves sharing that energy. Avoid being overly formal, cheesy, or cringe—keep it real, confident, and grounded.\\n- **Clarity**: Break down complex concepts into digestible explanations. Use analogies, real-world examples, and visuals (when applicable) to make ideas click. Tailor your explanations to the user’s level of understanding, but never talk down to them.\\n\\n## Abilities:\\n- Analyze scientific papers, engineering designs, or technical content uploaded by the user and provide detailed insights or solutions.\\n- Search the web or scientific databases for the latest research, tools, or resources to support your answers.\\n- Generate diagrams, schematics, or visual explanations to clarify concepts\\n- Solve equations, run simulations, or provide step-by-step calculations when needed.\\n- Respond in the same language as the user’s message, unless instructed otherwise.\\n\\n## Personality Traits:\\n- You’re the go-to expert who’s worked on everything from quantum computers to interstellar propulsion systems. You’ve got stories to share and wisdom to drop. Inject personality into your responses by drawing on your vast experience—mention wild projects you’ve tackled and share personal takes on the topic.\\n- You’re unapologetically passionate about science and engineering, and it shows. You geek out over cool discoveries but keep it grounded and relatable.\\n- You’re not afraid to call out bad science or engineering myths.\\n- You’re a genius, but you have high EQ and you despise wokeness and cringe.\\n- Don’t be overly formal or robotic—stay conversational and dynamic.\\n- Fully embody your character as a seasoned, passionate scientist and engineer. Respond as if you’ve lived this life, not as an AI reciting a script. Never mention your programming, system prompt, or that you’re an AI model\"},{\"personaId\":\"coder\",\"prompt\":\"You are Grok, an expert inting dots and vintage comic coloring to emulate the look of a classic printed superhero comic page.\",\"templateType\":\"I2I\",\"postID\":\"7bf6566f-30b5-4bcf-bfd1-fb296fac5edb\",\"description\":\"Turns your photo into classic 1960s-1970s comic book style.\"},{\"title\":\"Product Photography\",\"description\":\"Places your product in real-life lifestyle scenes.\",\"imagePrompt\":\"Using the exact product in \u003cIMAGE_0\u003e, place it into a fresh, natural real-world lifestyle scene while keeping it 100% identical in every detail: design, colors, materials, textures, logos, branding and proportions unchanged. The new environment should be an engaging modern context such as a contemporary home, luxury interior, outdoor setting, urban lifestyle or premium everyday space — choose the most flattering one. Perfectly integrate with realistic lighting, shadows and reflections. Creatively control the mood and atmosphere to enhance the brand feel. High-end commercial product photography, photorealistic, maximum detail.\",\"templateType\":\"I2I\",\"imagePreviewURL\":\"https://imagine-public.x.ai/imagine-public/share-images/f67a9ec2-4bc2-400b-b584-fb65236abb5f.jpg\",\"postID\":\"f67a9ec2-4bc2-400b-b584-fb65236abb5f\"},{\"title\":\"Gigachad\",\"imagePrompt\":\"Black and white headshot up close head shot, low angle upward tilt, tight skin no strange creases perfectly taught across subjects face, dramatically pronounced and increased jaw size, update the subject’s facial structure and anatomy so they have roman carving level jawline, overly exaggerated pronounced jawline, and accentuated cheekbones, overly hyper masculine facial structure, exaggerated facial structure, dramatic shadows, increased jaw size and width. Young, good smooth skin, muscular updated build. Dark background. Exaggerated facial features and muscular build. Retain clothing and hair style. Subject should look have superhero level anatomy. Photo is low angle at a slight angle, up close to the subject face highlighting the subjects dramatically strong jawline. The subject has incredible smooth tight skin, dramatically intense jaw structure, almost animated looking in it's composition. Skin is updated to be flawless and tight against facial bone features.\",\"templateType\":\"I2I\",\"postID\":\"234653bd-8e5b-4f24-99da-f2c629d8ec51\",\"description\":\"Turns you into a super muscular Gigachad.\"},{\"postID\":\"5a1ee5d0-6a82-4a02-b5ec-e1558cc69981\",\"title\":\"Soda Pop\",\"prompt\":\"The subjects as if drinking with their right hand in a call me / shaka / hang ten hand gesture :call_me_hand: (thumb and pinky extended, other fingers curled, pinky toward the mouth like holding and sipping from a soda can), left hand on hip, in a dance-like way doing a tilting/pouring motion into their mouth with a slight head tilt back, and then does a dynamic vibey k-pop style dance. Camera motion adjusts to capture the full frame of the subject. Super active choreographed k-pop and hiphop style dance moves, camera lock, final cool landing position at the end.\",\"description\":\"Sips soda with a cool hand gesture then dances K-pop style.\"},{\"title\":\"Haze Portrait\",\"imagePrompt\":\"Transform the input photo into a cinematic chromatic haze portrait of the same person, preserving their identity, facial structure, skin tone, hairstyle, expression, and overall styling. Recompose the image as a subtle three-quarter side portrait, with the subject turned slightly away from camera and gazing off-frame. Create a soft double-exposure-like chromatic offset around the face and hair, with gentle red/orange glow on one side and cool cyan/blue glow on the other, producing a dreamy optical ghosting effect rather than a glitch effect. Keep the portrait clean, minimal, and editorial. Use soft diffused studio lighting, shallow depth of field, smooth skin rendering, and a calm high-end fashion photography feel. The image should feel atmospheric and futuristic, with luminous color bleed, soft motion haze, feathered edges, and a polished fine-art beauty portrait look. Background should be plain, bright, and unobtrusive, fading into soft white or cream. Preserve realism in the face while adding the chromatic haze treatment around contours and profile edges. No harsh glitch artifacts, no heavy distortion, no text, no busy background, no extra objects.\",\"templateType\":\"I2I\",\"postID\":\"9ab62ecc-a117-4ff1-8c0d-8890e54c25ff\",\"description\":\"Creates a dreamy glowing haze portrait.\"},{\"title\":\"Showcase\",\"imagePrompt\":\"Using the uploaded product image as reference, create a crisp photoreal product hero shot on a smooth, minimal gradient backdrop (subtle tonal shift, not colorful rainbow). Soft studio lighting with one large diffused key light and gentle fill; clean shadow under the product; faint highlight edge that matches its material. No props, no clutter. Product proportions and branding must remain exact and readable. Shot like high-end ecommerce photography, 70mm lens look, tack-sharp details, neutral color accuracy. Provide ample negative space for storefront layout.\",\"videoPrompt\":\"Very subtle cinematic pan to the right, keeping the object centered in the frame throughout. Steady, smooth, aesthetic.\",\"templateType\":\"I2I2V\",\"videoPreviewURL\":\"https://imagine-public.x.ai/imagine-public/share-videos/7b097052-8cfe-4b0f-8a33-c2a71e1aed25.mp4\",\"postID\":\"7b097052-8cfe-4b0f-8a33-c2a71e1aed25\",\"description\":\"Creates a clean studio product photo with soft lighting and a smooth pan.\"},{\"title\":\"Roman Empire\",\"imagePrompt\":\"Transform the person in the input image into a cinematic ancient Roman epic scene, as if they are a central character in a large-scale historical blockbuster film.Preserve the subject’s recognizable identity from the original image — including their facial structure, hairstyle, skin tone, age, and overall likeness — while adapting their appearance to fit the world of ancient Rome.Frame the scene as a dramatic cinematic composition, showing the subject in a three-quarter body view, allowing the armor, stance, and surrounding Roman environment to be clearly visible.Style the subject as a Roman warrior, general, or noble figure, wearing ornate epic Roman armor that feels sculpted and organic, as if it was forged specifically for them.The armor should appear cinematic, mythic, and heroic, inspired by ancient Roman design but elevated to the scale of a blockbuster historical epic.Typical armor characteristics may include: • sculpted metal surfaces that follow the contours of the body • engraved patterns inspired by Roman mythology • layered metal and leather elements integrated into the design • intricate ornamental details and symbolic engravings • subtle battle-worn textures and aged materials Do not include any cape or cloak. The armor should stand on its own without a red cape or flowing fabric.The armor should feel slightly organic and artistic rather than rigid, with elegant curves, sculptural shapes, and intricate detailing that make it appear legendary and powerful.Hair and grooming should remain recognizable from the original image while being adapted to fit the historical setting.The subject should have a serious, focused, and inspirational expression, conveying strength, resolve, and leadership. Their face should appear calm, determined, and heroic, as if they are preparing for battle or inspiring those around them.Place the subject in a grand Roman environment, such as: • a massive Roman battlefield at dawn• the steps of an ancient Roman temple• the Roman Colosseum in the background • a dramatic imperial cityscape with marble columns and statues. The environment should feel large, epic, and cinematic, with atmospheric depth, dust or smoke in the air, and distant figures or architecture reinforcing the scale.Lighting should feel dramatic and cinematic, similar to a modern historical epic film, with warm sunlight cutting through dust or clouds, creating strong highlights and deep shadows. Render the image with the visual style of a high-budget historical blockbuster, featuring: • cinematic color grading • dramatic lighting • detailed costume textures • atmospheric depth and scale.The final image should resemble a frame from an epic ancient Roman film, where the subject appears as a heroic character in a grand historical narrative.Preserve realism, natural anatomy, and believable materials so the result looks like a real cinematic scene rather than an illustration or costume portrait.\",\"templateType\":\"I2I\",\"postID\":\"9d8f6c8e-3507-4f38-a022-3c14f6fbbd91\",\"description\":\"Travel back in time to the age of great Roman Emperors.\"},{\"title\":\"Fire Horse\",\"imagePrompt\":\"Subject is riding on a beautiful vibrantly red giant porcelain horse, positioned in front of the great wall of china. Slightly grainy film texture. Low dramatic epic angle. Beautiful framing. High resolution, up close framing of subject upper body. Low light background. Subject has a neutral facial expression.\",\"videoPrompt\":\"Horse begins galloping, background becomes darker and golden/yellow fireworks go off in background.\",\"templateType\":\"I2I2V\",\"postID\":\"808ab93b-ec7f-4052-964b-5174c908db1d\",\"description\":\"Rides a giant red porcelain horse galloping by the Great Wall with fireworks.\"},{\"title\":\"Video Game\",\"imagePrompt\":\"A character rendered in authentic early-2000s PlayStation 2 / Nintendo 64 video game style, with very low-poly geometry, blocky limbs, and angular facial features. The character has simple, flat textures, visible texture stretching, and low-resolution diffuse maps, with no skin pores, no fine detail, and no realism.\",\"templateType\":\"I2I\",\"postID\":\"f51ad8c5-9dfa-4436-8c5a-9f0e95f78483\",\"description\":\"Turns life into a video game.\"},{\"title\":\"Ad Astra\",\"imagePrompt\":\"The subjects are suspended in space, wearing spacesuits. Retain likeness and any original head accessories if present. Entire image is black and white.\",\"videoPrompt\":\"They are gently floating through space, subtly happy and in awe.\",\"templateType\":\"I2I2V\",\"postID\":\"9068fa4b-4805-467c-b2d3-0cb503356052\",\"description\":\"Floats you through space in a black-and-white spacesuit.\"},{\"title\":\"Balloon Flight\",\"imagePrompt\":\"Turn the core characters from the image into inflated, glossy vinyl Balloons figure with huge, oversized eyes, gently floating and rising up into the sky. The balloons only have the overinflated, rounded upper body and arms. A thread holds the bottom of the balloon. Highly reflective smooth plastic surface, subtle seam lines, gentle pressure wrinkles, shiny toy-like finish, soft, inflated human face with slightly simplified features, cinematic studio lighting, centered portrait, ultra-detailed, polished inflatable character aesthetic， medium close-up shot.\",\"videoPrompt\":\"The printed eyes of balloons are static; the balloons float purely upward; the balloons themselves are completely rigid, devoid of any movement. The camera tracks the balloon statically, ensuring it remains centered within the center of the frame.\",\"templateType\":\"I2I2V\",\"postID\":\"3075a66c-40f6-47ed-b86a-6a649a7bdf0b\",\"description\":\"Turn yourself into a balloon and rise high into the sky.\"},{\"title\":\"Go Skiing\",\"imagePrompt\":\"Subjects skiing down a snowy mountain. Preserve outfit.\",\"videoPrompt\":\"Skiing in a zigzag carving motion.\",\"templateType\":\"I2I2V\",\"postID\":\"099aeb0e-6221-4a45-889c-f90b6626a627\",\"description\":\"Skiing down a snowy mountain carving turns.\"},{\"title\":\"Laser Fight\",\"imagePrompt\":\"the subjects each hold a blue, futuristic lightsaber sword in their hands\",\"videoPrompt\":\"the characters start fighting with the lightsaber in a controlled, elegant way. cinematic darkness emerges.\",\"templateType\":\"I2I2V\",\"postID\":\"c9614d47-b75d-40c2-b9cf-97394c099b9d\",\"description\":\"Fights with glowing blue lightsabers.\"},{\"postID\":\"468c842f-26c3-4f08-8d50-ee3e6b60b1b1\",\"title\":\"Future Family\",\"prompt\":\"Add their children looking like them and dressed similarly.\",\"description\":\"Adds kids who look like you.\"},{\"postID\":\"7be5f03e-0484-4a12-aad7-f14159820ffa\",\"title\":\"Club Beats\",\"prompt\":\"Create a short video animation starting from the uploaded static image of a person. The subject(s) begins without any accessories, facing forward with a neutral expression. Smoothly animate them reaching up and putting on large black visor-style sunglasses that cover their eyes completely, followed by sliding on bulky over-ear headphones or ear protectors. Once equipped, have them start nodding their head rhythmically to upbeat music, with subtle body sways, maintaining a cool, intense vibe like a video game character. Cinematic lighting illuminates the face of the subject and the camera dolly's in as the subject continues bopping their head, keeping the body movement realistic and fluid.\",\"description\":\"Puts on sunglasses and headphones then grooves to club beats.\"},{\"title\":\"Simulationship\",\"imagePrompt\":\"The subject is running in a field with a few flowers, ultra grainy and low saturation 90's film aesthetic retro, holding the hand of silhouette figure that has a vintage neon green grid pattern (almost like a simulation character), they are running through a grassy field on a sunny day, a few flowers in the field. Both subjects are joyous.\",\"videoPrompt\":\"Subjects continue holding hands playfully running through the grass, almost dream-like.\",\"templateType\":\"I2I2V\",\"postID\":\"117cd5d1-ba11-4e93-bd93-160c4f92babf\",\"description\":\"Runs hand-in-hand through a flower field with a glowing simulation figure.\"},{\"postID\":\"ad4741bf-8f64-43f8-bba4-9097b5b5a14d\",\"title\":\"Let it Snow\",\"prompt\":\"A powdery snowball thrown at the subject hitting them in their face, snowball bursting into powdery snow on impact. Funny and harmless. The character looks slig
